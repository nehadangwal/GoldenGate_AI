version: '3.8'

services:
  # The SentryNode Gateway (Hardened Interface)
  sentrynode_gateway:
    build: .
    ports:
      - "8001:8001"
    environment:
      - MOCK_MODE=true
    networks:
      - sentry_network

# Note: Sovereign state management and ledger infrastructure
# are configured in the private production environment.
# Contact neha.sentrynode@gmail.com for enterprise deployment docs.

networks:
  sentry_network:
    driver: bridge