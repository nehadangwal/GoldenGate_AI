name: Notify HubSpot on Star
on:
  watch:
    types: [started]
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Webhook
        run: |
          curl -L -X POST "https://script.google.com/macros/s/AKfycbxZKJiWoxqaPgvwwBCMWezOz4xT5bxQkLoc93StigEC7ZIBq9lUAMelRBCjMofHFKHE/exec" \
          -H "Content-Type: application/json" \
          -d '{"username": "${{ github.event.sender.login }}", "repo": "${{ github.event.repository.name }}"}'
